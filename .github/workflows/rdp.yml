name: RDP

on: [workflow_dispatch]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Download bore
        run: |
          curl -L https://github.com/ekzhang/bore/releases/latest/download/bore-v0.5.3-x86_64-pc-windows-msvc.zip -o bore.zip
          tar -xf bore.zip

      - name: Create RDP user
        run: |
          net user kamel123 Myp@ssw0rd123! /add
          net localgroup administrators kamel123 /add

      - name: Enable RDP
        run: |
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name 'fDenyTSConnections' -Value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"

      - name: Start tunnel
        run: |
          $job = Start-Job -ScriptBlock {
            $p = Start-Process -FilePath .\bore.exe -ArgumentList "local 3389 --to bore.pub" -NoNewWindow -RedirectStandardOutput bore.log -PassThru
            $p.WaitForExit()
          }
          Start-Sleep -Seconds 8
          $log = Get-Content bore.log -ErrorAction SilentlyContinue
          Write-Host "===================================="
          Write-Host "BORE LOG: $log"
          Write-Host "===================================="
          Write-Host "RDP CONNECTION DETAILS:"
          Write-Host "Server: bore.pub"
          Write-Host "Username: kamel123"
          Write-Host "Password: Myp@ssw0rd123!"
          Write-Host "===================================="
          Start-Sleep -Seconds 21600
