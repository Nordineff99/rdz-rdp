name: RDP

on: [workflow_dispatch]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Download ngrok
        run: |
          Invoke-WebRequest https://bin.equinox.io/c/bNyj1mQVY4c/ngrok-stable-windows-amd64.zip -OutFile ngrok.zip
          Expand-Archive ngrok.zip
          ./ngrok.exe authtoken 3FVFM2bLfZuzVrdOfREVlIRnSau_4eA7sUamkxxnfHkcSe66y

      - name: Enable RDP
        run: |
          net user kamel123 MyStrong123 /add
          net localgroup administrators kamel123 /add
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name 'fDenyTSConnections' -Value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
          ./ngrok.exe tcp 3389
🔄 استبدل YOUR_AUTH_TOKEN برمز ngrok الخاص بك.

تشغيل الـ RDP:
- ادخل على Actions ← اختر Run workflow
- بعد انتهاء التشغيل، سيظهر رابط مثل:
tcp://0.tcp.ngrok.io:12345
- افتح برنامج RDP على جهازك، واكتب الرابط في خانة السيرفر.
- اسم المستخدم: kamel123
- كلمة السر: MyStrong123
