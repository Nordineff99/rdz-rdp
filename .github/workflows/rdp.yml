name: RDP

on: [workflow_dispatch]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Install Tailscale
        run: |
          curl -L https://pkgs.tailscale.com/stable/tailscale-setup-latest-amd64.msi -o tailscale.msi
          msiexec /i tailscale.msi /quiet /qn

      - name: Auth and connect Tailscale
        run: |
          & "C:\Program Files\Tailscale\tailscale.exe" up --authkey tskey-auth-k2vabBGVgP11CNTRL-WEA94qYdebBmnvToHKiWbBv6frbCnEw7Q
          Start-Sleep -Seconds 5
          $ip = & "C:\Program Files\Tailscale\tailscale.exe" ip -4
          Write-Host "===================================="
          Write-Host "RDP CONNECTION DETAILS:"
          Write-Host "Server: $ip"
          Write-Host "Username: kamel123"
          Write-Host "Password: Myp@ssw0rd123!"
          Write-Host ""
          Write-Host "Connect using the IP above via RDP"
          Write-Host "===================================="

      - name: Create RDP user
        run: |
          net user kamel123 Myp@ssw0rd123! /add
          net localgroup administrators kamel123 /add

      - name: Enable RDP
        run: |
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name 'fDenyTSConnections' -Value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"

      - name: Keep alive
        run: |
          Write-Host "Runner connected to your Tailnet. RDP to the IP above."
          Start-Sleep -Seconds 21600
